<!-- ========================
dashboard-page.html
========================= -->

<h1>Dashboard</h1>
<div class="grid-container">
    <app-today-events-widget
        [events]="(events$ | async) ?? []"></app-today-events-widget>
    @if (chartService.newCustomersChartData(); as data) {
    <app-line-chart-component
        class="dashboard__chart item-wide" [data]="data">
    </app-line-chart-component>
    }
    @if (chartService.projectsChartData(); as data) {
    <app-ring-chart-component
        class="dashboard__chart item-narrow" [data]="data">
    </app-ring-chart-component>
    }
    @if (chartService.salesChartData(); as data) {
    <app-bar-chart-component
        class="dashboard__chart item-narrow" [data]="data">
    </app-bar-chart-component>
    }
    <app-world-map-component
        class="dashboard__chart item-narrow" />
    @if (chartService.transactions(); as data) {
    <app-dragable-table-component
        class="dashboard__chart item-narrow" [data]="data"
        [displayedColumns]="transactionColumns"
        [cellFormatter]="cellFormatter" idKey="txId"
        (reorder)="onTransactionsReorder($event)" />
    }
</div>

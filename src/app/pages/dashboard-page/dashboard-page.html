<!-- ========================
dashboard-page.html
========================= -->

<h1>Dashboard</h1>
<div class="grid-container">
    <app-weather-widget
        class="dashboard__card item-narrow item-short">
    </app-weather-widget>

    <app-today-events-widget routerLink="/calendar"
        class="dashboard__card item-narrow item-short linked-component"
        [events]="(events$ | async) ?? []">
    </app-today-events-widget>

    <app-news-ticker-widget
        class="dashboard__card item-narrow item-short">
    </app-news-ticker-widget>

    <app-line-chart-component routerLink="/new-customers"
        class="dashboard__card item-wide item-high linked-component"
        [data]="chartService.newCustomersChartData()">
    </app-line-chart-component>

    <app-ring-chart-component
        class="dashboard__card item-narrow item-high"
        [data]="chartService.projectsChartData()">
    </app-ring-chart-component>

    <app-bar-chart-component routerLink="/monthly-sales"
        class="dashboard__card item-narrow item-high linked-component"
        [data]="chartService.salesChartData()">
    </app-bar-chart-component>

    <app-world-map-component routerLink="/world-map"
        class="dashboard__card item-narrow item-high linked-component" />

    <app-dragable-table-component
        class="dashboard__card item-narrow item-high"
        [class.table-mobile]="isMobile()"
        [data]="chartService.transactions()"
        [displayedColumns]="transactionColumns"
        [cellFormatter]="cellFormatter" idKey="txId"
        (reorder)="onTransactionsReorder($event)" />
</div>

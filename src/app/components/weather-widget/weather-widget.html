<div class="card__root weather-widget">
    <div class="weather-row-1">
        <span>{{ state().time | date:'HH:mm'
            }}</span>
        <div class="weather-container">
            <span class="weather-icon">
                {{ state().weatherIcon }}
            </span>

            <span>{{
                formattedTemperature() }}</span>
        </div>
    </div>
    <div class="weather-row-2">
        <span class="weather-widget__row2">{{
            state().locationLabel }}</span>
    </div>


    @if (state().error) {
    <span>
        {{ state().error }}
    </span>
    }
</div>
